name: Build and Deploy PMTiles

on:
  workflow_dispatch:
    inputs:
      pbf_url:
        description: "OSM PBF source URL (Geofabrik or direct download)"
        required: false
        default: "https://download.geofabrik.de/asia/philippines-latest.osm.pbf"
      java_xmx:
        description: "Planetiler JVM heap size (e.g. 4g)"
        required: false
        default: "4g"
      storage_auth_mode:
        description: "Storage auth mode (default login; key mode requires AZURE_STORAGE_KEY secret)"
        type: choice
        options:
          - login
          - key
        default: login
      overwrite_blob:
        description: "Overwrite the blob if it already exists"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read

concurrency:
  # Only one build-deploy run at a time to avoid partial overwrites.
  group: build-deploy-pmtiles
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pmtiles_filename: ${{ steps.set_names.outputs.pmtiles_filename }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build artifact names
        id: set_names
        shell: bash
        run: |
          set -euo pipefail
          short_hash="${GITHUB_SHA::7}"
          # Note: date is UTC (GitHub Actions runner timezone). This is intentional.
          pmtiles_filename="philippines-$(date -u +%Y%m%d)-${short_hash}.pmtiles"
          pbf_url="${{ inputs.pbf_url || 'https://download.geofabrik.de/asia/philippines-latest.osm.pbf' }}"
          pbf_filename="${pbf_url##*/}"
          echo "pmtiles_filename=${pmtiles_filename}" >> "$GITHUB_OUTPUT"
          echo "PMTILES_FILENAME=${pmtiles_filename}" >> "$GITHUB_ENV"
          echo "PBF_FILENAME=${pbf_filename}" >> "$GITHUB_ENV"

      - name: Download OSM PBF
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          curl -L \
            --retry 5 \
            --retry-delay 10 \
            --retry-connrefused \
            --output "data/${PBF_FILENAME}" \
            "${{ inputs.pbf_url || 'https://download.geofabrik.de/asia/philippines-latest.osm.pbf' }}"
          echo "PBF size: $(du -sh "data/${PBF_FILENAME}")"

      - name: Build PMTiles with Planetiler
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/data/build_pmtiles_planetiler.sh
          INPUT_PBF="data/${PBF_FILENAME}" \
          OUTPUT_PMTILES="data/pmtiles/${PMTILES_FILENAME}" \
          JAVA_XMX="${{ inputs.java_xmx || '4g' }}" \
          scripts/data/build_pmtiles_planetiler.sh

      - name: Upload PMTiles artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmtiles-artifact
          path: data/pmtiles/*.pmtiles
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: paraInfraGIS-rg
      STORAGE_ACCOUNT: paragisstorage
      CONTAINER_NAME: maps
      AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PMTiles artifact
        uses: actions/download-artifact@v4
        with:
          name: pmtiles-artifact
          path: data/pmtiles

      - name: Validate Azure auth secrets
        shell: bash
        run: |
          set -euo pipefail
          has_valid_json="false"
          has_split="false"

          if [[ -n "${AZURE_CREDENTIALS}" ]] && jq -e . >/dev/null 2>&1 <<< "${AZURE_CREDENTIALS}"; then
            has_valid_json="true"
          fi

          if [[ -n "${AZURE_CLIENT_ID}" && -n "${AZURE_TENANT_ID}" && -n "${AZ_SUBSCRIPTION_ID}" ]]; then
            has_split="true"
          fi

          if [[ "$has_valid_json" == "false" && "$has_split" == "false" ]]; then
            echo "Missing usable Azure auth secrets. Provide valid AZURE_CREDENTIALS JSON or AZURE_CLIENT_ID + AZURE_TENANT_ID + AZ_SUBSCRIPTION_ID."
            exit 1
          fi

      - name: Select Azure auth mode
        id: azure_auth
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${AZURE_CREDENTIALS}" ]] && jq -e . >/dev/null 2>&1 <<< "${AZURE_CREDENTIALS}"; then
            echo "auth_method=json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${AZURE_CREDENTIALS}" ]]; then
            echo "AZURE_CREDENTIALS is present but not valid JSON. Falling back to split service principal secrets."
          fi

          echo "auth_method=split" >> "$GITHUB_OUTPUT"

      - name: Azure login (AZURE_CREDENTIALS JSON)
        if: ${{ steps.azure_auth.outputs.auth_method == 'json' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Azure login (split service principal secrets)
        if: ${{ steps.azure_auth.outputs.auth_method == 'split' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZ_SUBSCRIPTION_ID }}

      - name: Deploy PMTiles
        shell: bash
        env:
          LOCAL_FILE: data/pmtiles/${{ needs.build.outputs.pmtiles_filename }}
          BLOB_NAME: ${{ needs.build.outputs.pmtiles_filename }}
          STORAGE_AUTH_MODE: ${{ inputs.storage_auth_mode || 'login' }}
          BLOB_OVERWRITE: ${{ inputs.overwrite_blob || 'false' }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          set -euo pipefail
          chmod +x scripts/deploy/azure_publish_pmtiles.sh
          scripts/deploy/azure_publish_pmtiles.sh all
